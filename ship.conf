{
  "ship": {
    "name": "SHIP - Secure Hosting & Installation Platform",
    "version": "1.0.0",
    "description": "Official QTMX package repository and storage system"
  },
  "repository": {
    "url": "https://ship.qtmx-lang.org",
    "mirror": "https://mirror.qtmx-lang.org",
    "api": "https://api.ship.qtmx-lang.org"
  },
  "storage": {
    "local_path": "~/.qtmx/packages",
    "cache_path": "~/.qtmx/cache",
    "metadata_path": "~/.qtmx/metadata",
    "max_size": "10GB"
  },
  "security": {
    "verify_integrity": true,
    "verify_signature": true,
    "verify_author": true,
    "auto_update": false
  },
  "features": {
    "install": true,
    "uninstall": true,
    "search": true,
    "verify": true,
    "stats": true,
    "export": true,
    "import": true
  },
  "registry": {
    "type": "json",
    "format": "ship-registry-v1",
    "sync_interval": 3600
  }
}
